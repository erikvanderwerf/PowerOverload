[entity-description]
po-electric-fuse=Гораздо более склонен к взрыву при перегрузке и имеет более низкое максимальное потребление, чем соответствующая опора ЛЭП.
po-transformer=Разделяет электрические сети друг от друга со средним приоритетом.\nЭффективность можно изменить в настройках мода.
po-transformer-high=Разделяет электрические сети друг от друга с высоким приоритетом.\nЭффективность можно изменить в настройках мода.
po-transformer-low=Разделяет электрические сети друг от друга с низким приоритетом.\nЭффективность можно изменить в настройках мода.
po-interface=Может выдерживать практически бесконечное количество энергии, но только для одной машины.\nМожно поворачивать после установки.

[item-name]
po-hidden-electric-pole=Подключение трансформатора

[item-description]
po-hidden-electric-pole=Вспомогательный элемент для отображения соединений трансформатора на чертежах. Будет удален после установки трансформатора.\nСоединения могут выглядеть некорректно, если чертеж повернут или отражен, но эта ошибка сама собой исправляется после установки трансформатора.

