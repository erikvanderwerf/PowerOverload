power-overload-on-pole-overload=Действие при перегрузке опоры ЛЭП
power-overload-log-to-chat=Сообщать в чате о взрыве опор ЛЭП
power-overload-transformer-efficiency=Эффективность трансформатора
power-overload-entity=__ENTITY____1____

[string-mod-setting]
power-overload-on-pole-overload-destroy=Уничтожение
power-overload-on-pole-overload-damage=Урон
power-overload-on-pole-overload-fire=Воспламенение
power-overload-on-pole-overload-nothing=Ничего

[mod-setting-description]
power-overload-disconnect-different-poles=Предотвращает случайное подключение опор ЛЭП к различным электросетям, которые имеют разное максимальное потребление.
power-overload-transformer-efficiency=Сколько энергии выделяется на каждую единицу потребляемой энергии. 1 означает, что вся энергия передается, 0 означает, что энергия не передается.

[string-mod-setting-description]
power-overload-on-pole-overload-nothing=Используйте временно при добавлении мода к существующему сохранению, чтобы сначала можно было внести необходимые корректировки.

[overload-alert]
alert=[entity=__1__] уничтожен (Потребление = __2__MW)

[tips-and-tricks-item-name]
po-main=Перенапряжение электросети
po-transformer=Трансформаторы
po-fuse=Предохранители
po-pole-connections=Подключение опор ЛЭП

[tips-and-tricks-item-description]
po-main=Обзор основных функций и изменений в моде [font=default-semibold]Power Overload[/font]. Демонстрационные симуляции будут доступны в ближайшее время.\nОпора ЛЭП может взорваться, если общее потребление энергии в электросети превышает максимальное потребление этой опоры. Максимальное потребление опоры ЛЭП можно посмотреть в подсказке.
po-transformer=[entity=po-transformer] можно использовать для разделения электросетей, чтобы каждая подсеть оставалась ниже своего предела.\nЭффективность передачи энергии трансформатором составляет всего 98% (это можно изменить в настройках мода).
po-fuse=Предохранители имеют более низкое максимальное потребление, чем соответствующие им опоры ЛЭП, и с большей вероятностью взрываются при перегрузке.\nИх можно разместить на входе в подсеть таким образом, чтобы они взрывались до того, как общее потребление электросети станет слишком высоким, отключая сеть от электропитания и тем самым защищая все остальные столбы в электросети от перегрузки. Использование предохранителей для создания электросети, полностью необязательное.
po-pole-connections=Поскольку каждый тип опоры ЛЭП имеет разное максимальное потребление, обычно рекомендуется, чтобы каждая подсеть электросети содержала только один тип опоры ЛЭП.\nЧтобы помочь с этим, вновь построенные опоры ЛЭП больше не будут автоматически подключаться к опорам ЛЭП другим типов.


